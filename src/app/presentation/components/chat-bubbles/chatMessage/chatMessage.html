<div class="col-start-1 col-end-9 p-3 rounded-lg">
  <div class="flex flex-row items-start">
    <div class="flex items-center justify-center h-10 w-10 rounded-full bg-green-600 shrink-0">
      G
    </div>

    <div class="relative ml-3 text-sm bg-black bg-opacity-25 pt-3 pb-2 px-4 shadow rounded-xl">
      <markdown [data]="text()" />
      @if (audio()) {
        <audio [src]="audio()" controls></audio>
      }

      @if (imageInfo()) {
        <img
          [src]="imageInfo()?.url"
          [alt]="imageInfo()?.alt"
          class="w-96 h-96 rounded-xl object-cover"
        />
      }
    </div>
  </div>
</div>
